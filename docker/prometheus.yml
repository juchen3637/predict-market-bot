global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "predict-market-bot"
    static_configs:
      # host.docker.internal resolves to the Docker host IP from inside a container.
      # Port 8001 — port 8000 is reserved for Serena MCP on morningside-vps.
      - targets: ["host.docker.internal:8001"]
    scrape_interval: 15s
